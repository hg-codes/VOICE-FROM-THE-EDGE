<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heritage at Risk | Folk Music Endangered Status Dashboard</title>
  <meta name="description" content="Interactive heritage health monitor for Baul, Kinnera and Villu Pattu — endangered Indian folk music traditions.">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    :root {
      --c: #5AACF0; /* active tradition colour — overridden per tab */
      --cd: #1E6AAA;
      --bg: #04060F;
    }
    body {
      background: var(--bg);
      color: #D0D8E8;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── BG GLOW ── */
    .bg-glow {
      position: fixed; inset:0; z-index:0; pointer-events:none;
      background:
        radial-gradient(ellipse 60% 40% at 15% 5%, rgba(var(--gr),0.07) 0%, transparent 65%),
        radial-gradient(ellipse 50% 35% at 85% 85%, rgba(var(--gr),0.04) 0%, transparent 65%);
      transition: background 0.8s;
    }

    /* ── STICKY HEADER ── */
    #hdr {
      position: sticky; top:0; z-index: 100;
      background: rgba(4,6,15,.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,.06);
      padding: 0 48px;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px;
    }
    .hdr-left { display:flex; align-items:center; gap:14px; }
    .hdr-dot-wrap { display:flex; align-items:center; gap:6px; }
    .pulse-dot { width:8px; height:8px; border-radius:50%; background:#E05050; animation: pulse 1.5s ease infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.45;transform:scale(.65);} }
    .hdr-live { font-size:.6rem; letter-spacing:.14em; color:#E05050; font-weight:600; }
    h1 { font-family:'Cinzel',serif; font-size:1.05rem; color:#E8E0F0; letter-spacing:.06em; }

    /* ── TABS ── */
    #tabs {
      display:flex; gap:8px; padding: 18px 48px; flex-wrap:wrap;
      position: sticky; top:64px; z-index:90;
      background: rgba(4,6,15,.88); backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(255,255,255,.04);
    }
    .tab {
      padding: 8px 20px; border-radius:30px; cursor:pointer;
      font-size:.78rem; font-weight:500; border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03); color:rgba(200,210,230,.45);
      transition: all .22s; letter-spacing:.04em; user-select:none;
    }
    .tab:hover { border-color:rgba(255,255,255,.18); color:rgba(220,230,250,.7); }
    .tab.active { color:#fff; border-color:var(--c); background: rgba(255,255,255,.05);
      box-shadow: 0 0 16px rgba(var(--gr),.18); }

    /* ── PAGE CONTENT ── */
    #view { position:relative; z-index:1; padding:40px 48px 80px; max-width:1400px; margin:0 auto; }

    /* ── FADE TRANSITION ── */
    .view-enter { animation: viewIn .45s ease both; }
    @keyframes viewIn { from{opacity:0;transform:translateY(14px);} to{opacity:1;transform:none;} }

    /* ── SECTION TITLE ── */
    .sec-title {
      font-size:.6rem; letter-spacing:.16em; color:rgba(160,170,200,.4);
      text-transform:uppercase; margin-bottom:16px; display:flex; align-items:center; gap:10px;
    }
    .sec-title::after { content:''; flex:1; height:1px; background:rgba(255,255,255,.05); }

    /* ── SCROLL REVEAL ── */
    .reveal { opacity:0; transform:translateY(20px); transition: opacity .55s ease, transform .55s ease; }
    .reveal.left  { transform:translateX(-30px); }
    .reveal.right { transform:translateX(30px); }
    .reveal.scale { transform:scale(.92); }
    .reveal.done  { opacity:1 !important; transform:none !important; }

    /* ── HERO BANNER (single tradition) ── */
    .hero-banner {
      border-radius:20px; padding:40px 36px;
      border:1px solid rgba(255,255,255,.08);
      background: linear-gradient(135deg, rgba(var(--gr),.12) 0%, rgba(var(--gr),.03) 100%);
      display:flex; align-items:flex-start; gap:32px; margin-bottom:32px;
      position:relative; overflow:hidden;
    }
    .hero-banner::before {
      content:''; position:absolute; top:-40px; right:-40px; width:240px; height:240px;
      border-radius:50%; background:radial-gradient(circle, rgba(var(--gr),.15) 0%, transparent 70%);
    }
    .hb-icon { font-size:5rem; line-height:1; flex-shrink:0; filter:drop-shadow(0 0 20px rgba(var(--gr),.5)); }
    .hb-info { flex:1; }
    .hb-name { font-family:'Cinzel',serif; font-size:2.4rem; color:var(--c); letter-spacing:.04em; margin-bottom:4px; }
    .hb-script { font-size:1.1rem; color:rgba(var(--gr),.55); margin-bottom:8px; }
    .hb-region { font-size:.78rem; color:rgba(180,190,210,.55); margin-bottom:16px; letter-spacing:.06em; }
    .hb-badges { display:flex; gap:8px; flex-wrap:wrap; }
    .hb-right { text-align:right; flex-shrink:0; }
    .risk-big-label { font-size:.6rem; letter-spacing:.12em; color:rgba(160,170,200,.4); margin-bottom:4px; }
    .risk-big-val { font-family:'JetBrains Mono',monospace; font-size:3.5rem; font-weight:600; color:var(--c); line-height:1; }
    .risk-big-sub { font-size:.68rem; color:rgba(160,170,200,.4); margin-top:4px; }

    /* ── METRICS GRID ── */
    .metrics-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:32px; }
    .metric {
      background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.07);
      border-radius:14px; padding:22px 18px; text-align:center; position:relative; overflow:hidden;
    }
    .metric::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; background:var(--c); opacity:.35; }
    .metric-val { font-family:'JetBrains Mono',monospace; font-size:1.55rem; font-weight:600; color:var(--c); margin-bottom:5px; }
    .metric-lbl { font-size:.6rem; color:rgba(160,170,200,.5); letter-spacing:.1em; text-transform:uppercase; }
    .metric-sub { font-size:.64rem; color:rgba(120,130,160,.45); margin-top:4px; line-height:1.5; }

    /* ── HEALTH BARS ── */
    .health-panel { background:rgba(255,255,255,.025); border:1px solid rgba(255,255,255,.06); border-radius:14px; padding:22px 20px; margin-bottom:32px; }
    .hbar-row { margin-bottom:14px; }
    .hbar-row:last-child { margin-bottom:0; }
    .hbar-head { display:flex; justify-content:space-between; font-size:.7rem; color:rgba(180,190,210,.6); margin-bottom:6px; }
    .hbar-track { height:7px; border-radius:4px; background:rgba(255,255,255,.07); overflow:hidden; }
    .hbar-fill { height:100%; border-radius:4px; background:var(--c); width:0; transition:width 1.4s cubic-bezier(.22,.68,0,1.2); }

    /* ── QUOTE CARD ── */
    .quote-card {
      border-left:3px solid var(--c); padding:18px 22px; margin-bottom:32px;
      background:rgba(255,255,255,.025); border-radius:0 12px 12px 0;
    }
    .quote-text { font-size:.88rem; line-height:1.75; color:rgba(200,210,230,.75); font-style:italic; margin-bottom:8px; }
    .quote-attr { font-size:.7rem; color:rgba(var(--gr),.55); letter-spacing:.06em; }

    /* ── THREATS ── */
    .threats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:32px; }
    .threat-card {
      background:rgba(255,255,255,.025); border:1px solid rgba(255,255,255,.06);
      border-radius:14px; padding:20px 18px;
    }
    .threat-icon { font-size:1.6rem; margin-bottom:10px; }
    .threat-name { font-size:.82rem; font-weight:600; color:#E8E0F0; margin-bottom:6px; }
    .threat-desc { font-size:.73rem; line-height:1.6; color:rgba(180,190,210,.6); }
    .sev-bar { margin-top:12px; height:3px; border-radius:2px; background:rgba(255,255,255,.07); overflow:hidden; }
    .sev-fill { height:100%; border-radius:2px; background:linear-gradient(90deg, var(--cd), var(--c)); width:0; transition:width 1.4s cubic-bezier(.22,.68,0,1.2); }

    /* ── TIMELINE ── */
    .timeline-wrap { position:relative; padding:20px 0; margin-bottom:32px; }
    .tl-spine {
      position:absolute; left:50%; top:0; transform:translateX(-50%);
      width:2px; background:linear-gradient(to bottom, var(--c), rgba(var(--gr),.1));
      height:0; transition:height 2.5s ease; z-index:0;
    }
    .tl-spine.grow { height:100%; }
    .tl-event {
      display:flex; align-items:flex-start; margin-bottom:52px; position:relative;
      gap:0;
    }
    /* dot in center */
    .tl-center { width:60px; flex-shrink:0; display:flex; align-items:flex-start; justify-content:center; padding-top:14px; position:relative; z-index:1; }
    .tl-dot {
      width:16px; height:16px; border-radius:50%; border:3px solid var(--c);
      background:var(--bg); flex-shrink:0;
      opacity:0; transform:scale(0);
      transition: opacity .4s ease, transform .4s cubic-bezier(.34,1.56,.64,1);
    }
    .tl-dot.pop { opacity:1; transform:scale(1); }
    /* cards */
    .tl-card {
      width:calc(50% - 30px); padding:18px 20px;
      background:rgba(255,255,255,.025); border:1px solid rgba(255,255,255,.06);
      border-radius:14px; opacity:0; transition: opacity .55s ease, transform .55s ease;
    }
    .tl-card.from-right { transform:translateX(36px); }
    .tl-card.from-left  { transform:translateX(-36px); }
    .tl-card.revealed   { opacity:1; transform:none; }
    .tl-spacer { width:calc(50% - 30px); }
    .tl-event.left  .tl-card { order:-1; text-align:right; }
    .tl-event.left  .tl-spacer { order:1; }
    .tl-event.right .tl-card { order:1; text-align:left; }
    .tl-event.right .tl-spacer { order:-1; }
    .tl-yr { font-family:'JetBrains Mono',monospace; font-size:.72rem; color:var(--c); margin-bottom:5px; font-weight:500; }
    .tl-text { font-size:.77rem; line-height:1.65; color:rgba(200,210,230,.75); }
    .tl-chip {
      display:inline-block; font-size:.58rem; padding:2px 8px; border-radius:8px;
      font-weight:700; border:1px solid; margin-top:7px; letter-spacing:.07em;
    }
    .chip-milestone { color:#40C070; border-color:rgba(60,180,100,.35); background:rgba(60,180,100,.08); }
    .chip-threat    { color:#E07050; border-color:rgba(220,100,60,.35); background:rgba(220,100,60,.08); }
    .chip-crisis    { color:#E04040; border-color:rgba(220,50,50,.35); background:rgba(220,50,50,.1); }
    .chip-positive  { color:#50A0E0; border-color:rgba(60,150,220,.35); background:rgba(60,150,220,.08); }
    .chip-present   { color:#D0A030; border-color:rgba(200,160,40,.35); background:rgba(200,160,40,.08); }

    /* ── EFFORTS ── */
    .efforts-list { list-style:none; }
    .effort-item {
      padding:14px 18px; border-radius:12px; margin-bottom:10px;
      background:rgba(255,255,255,.025); border:1px solid rgba(255,255,255,.05);
      display:flex; align-items:flex-start; gap:12px;
    }
    .effort-icon { font-size:1.1rem; flex-shrink:0; margin-top:1px; }
    .effort-text { font-size:.76rem; line-height:1.6; color:rgba(190,200,220,.75); }

    /* ── KEY FIGURE ── */
    .figure-card {
      background:rgba(255,255,255,.025); border:1px solid rgba(var(--gr),.18);
      border-radius:14px; padding:20px 22px; margin-bottom:32px;
      display:flex; align-items:center; gap:16px;
    }
    .figure-icon { font-size:2.4rem; flex-shrink:0; }
    .figure-name { font-size:.9rem; font-weight:600; color:var(--c); margin-bottom:3px; }
    .figure-sub  { font-size:.72rem; color:rgba(180,190,210,.5); }

    /* ── ALL-VIEW HERO CARDS ── */
    .all-cards { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-bottom:32px; }
    .av-card {
      border-radius:16px; padding:24px 20px; border:1px solid rgba(255,255,255,.07);
      position:relative; overflow:hidden; cursor:pointer;
      transition: transform .2s, border-color .2s, box-shadow .2s;
    }
    .av-card:hover { transform:translateY(-3px); border-color:rgba(255,255,255,.15); box-shadow:0 12px 40px rgba(0,0,0,.35); }
    .av-card::before { content:''; position:absolute; inset:0; opacity:.08; pointer-events:none;
      background:radial-gradient(circle at 80% 0%, var(--c) 0%, transparent 60%); }
    .av-flag { font-size:2rem; margin-bottom:10px; }
    .av-name { font-family:'Cinzel',serif; font-size:1.1rem; margin-bottom:3px; color:var(--c); }
    .av-loc  { font-size:.68rem; color:rgba(180,190,210,.45); margin-bottom:14px; letter-spacing:.07em; }
    .av-bar-wrap { margin-bottom:9px; }
    .av-bar-head { display:flex; justify-content:space-between; font-size:.64rem; color:rgba(160,170,200,.5); margin-bottom:4px; }
    .av-bar { height:5px; border-radius:3px; background:rgba(255,255,255,.07); overflow:hidden; }
    .av-fill { height:100%; border-radius:3px; width:0; transition:width 1.4s cubic-bezier(.22,.68,0,1.2); }
    .av-hint { margin-top:14px; font-size:.64rem; color:rgba(var(--gr),.4); letter-spacing:.06em; }

    /* ── BADGE STYLES ── */
    .badge {
      display:inline-block; font-size:.6rem; padding:2px 9px; border-radius:10px;
      font-weight:600; letter-spacing:.07em; border:1px solid;
    }
    .badge-green  { color:#40C070; border-color:rgba(60,180,100,.3); background:rgba(60,180,100,.08); }
    .badge-yellow { color:#D0A030; border-color:rgba(200,160,40,.3); background:rgba(200,160,40,.08); }
    .badge-red    { color:#E05060; border-color:rgba(220,60,80,.3); background:rgba(220,60,80,.08); }
    .badge-blue   { color:#50A0E0; border-color:rgba(60,150,220,.3); background:rgba(60,150,220,.08); }

    /* ── GAUGE ARC ── */
    .gauge-wrap { display:flex; align-items:center; gap:24px; padding:20px 22px;
      background:rgba(255,255,255,.025); border:1px solid rgba(255,255,255,.06); border-radius:14px; margin-bottom:32px; }
    .gauge-svg  { flex-shrink:0; }
    .gauge-info .gi-label { font-size:.6rem; letter-spacing:.12em; color:rgba(160,170,200,.4); text-transform:uppercase; margin-bottom:4px; }
    .gauge-info .gi-val   { font-family:'JetBrains Mono',monospace; font-size:2rem; font-weight:600; color:var(--c); }
    .gauge-info .gi-sub   { font-size:.72rem; color:rgba(160,170,200,.5); margin-top:3px; }
    .gauge-info .gi-desc  { font-size:.72rem; line-height:1.6; color:rgba(180,190,210,.6); margin-top:10px; max-width:400px; }

    /* ── SOURCE NOTE ── */
    .source-note { margin-top:36px; padding:14px 18px; border-radius:10px;
      background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.05);
      font-size:.65rem; color:rgba(120,130,160,.4); line-height:1.75; }

    /* ── RESPONSIVE ── */
    @media (max-width:900px) {
      #hdr, #tabs, #view { padding-left:20px; padding-right:20px; }
      .all-cards, .metrics-grid, .threats-grid { grid-template-columns:1fr; }
      .tl-event { flex-direction:column; }
      .tl-center { width:100%; }
      .tl-spine  { left:8px; }
      .tl-card, .tl-spacer { width:100%; }
    }
  </style>
</head>

<!-- Sticky Header -->

<!-- Tabs -->

const ARC = 188.5;
function gaugeArc(score, color, id){
  return `<svg class="gauge-svg" viewBox="0 0 140 80" width="160" height="92">
    <path d="M10,75 A60,60 0 0,1 130,75" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="14" stroke-linecap="round"/>
    <path d="M10,75 A60,60 0 0,1 130,75" fill="none" stroke="${color}" stroke-width="14" stroke-linecap="round"
          stroke-dasharray="${ARC}" stroke-dashoffset="${ARC}" id="${id}"
          style="transition:stroke-dashoffset 1.8s cubic-bezier(.22,.68,0,1.2)"/>
  </svg>`;
}

/* ════════════════════════════════════════════════════
   SCROLL ANIMATIONS ENGINE
════════════════════════════════════════════════════ */
let revealObs;
function initRevealObs(){
  if(revealObs) revealObs.disconnect();
  revealObs = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(!e.isIntersecting) return;
      const el = e.target;
      const delay = parseInt(el.style.transitionDelay)||0;
      setTimeout(()=> el.classList.add('done'), delay);
      revealObs.unobserve(el);
    });
  }, {threshold:0.12});
  document.querySelectorAll('.reveal').forEach(el=> revealObs.observe(el));
}

function initBars(){
  document.querySelectorAll('.hbar-fill[data-w], .av-fill[data-w], .sev-fill[data-w]').forEach(bar=>{
    const barObs = new IntersectionObserver(entries=>{
      entries.forEach(e=>{
        if(!e.isIntersecting) return;
        setTimeout(()=>{ bar.style.width = bar.dataset.w + '%'; }, 300);
        barObs.unobserve(e.target);
      });
    }, {threshold:0.2});
    barObs.observe(bar);
  });
}

function initGauge(){
  const arc = document.getElementById('gauge-arc');
  const val = document.getElementById('gauge-val');
  const score = parseInt(arc?.parentElement?.parentElement?.querySelector('.gauge-wrap') ? 0 : 0);
  // Find score from the parent tradition
  const t = TRADITIONS[currentTab];
  if(!t) return;
  const obs = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(!e.isIntersecting) return;
      if(arc) arc.style.strokeDashoffset = ARC - (ARC * t.riskScore / 100);
      if(val){
        let cur=0; const step=t.riskScore/50;
        const timer=setInterval(()=>{ cur=Math.min(cur+step,t.riskScore); val.textContent=Math.round(cur); if(cur>=t.riskScore)clearInterval(timer); },30);
      }
      obs.disconnect();
    });
  },{threshold:0.3});
  if(arc) obs.observe(arc);
}

function initAllGauges(){
  Object.values(TRADITIONS).forEach(t=>{
    const arc = document.getElementById(`ga-${t.id}`);
    const val = document.getElementById(`gv-${t.id}`);
    if(!arc) return;
    const obs = new IntersectionObserver(entries=>{
      entries.forEach(e=>{
        if(!e.isIntersecting) return;
        arc.style.strokeDashoffset = ARC - (ARC * t.riskScore / 100);
        if(val){
          let cur=0;const step=t.riskScore/50;
          const timer=setInterval(()=>{cur=Math.min(cur+step,t.riskScore);val.textContent=Math.round(cur);if(cur>=t.riskScore)clearInterval(timer);},30);
        }
        obs.disconnect();
      });
    },{threshold:0.3});
    obs.observe(arc);
  });
}

/* ── TIMELINE ANIMATIONS ── */
function initTimeline(){
  const spine = document.getElementById('tl-spine');
  if(!spine) return;

  const spineObs = new IntersectionObserver(entries=>{
    entries.forEach(e=>{ if(e.isIntersecting){ spine.classList.add('grow'); spineObs.disconnect(); } });
  },{threshold:0.05});
  spineObs.observe(spine);

  document.querySelectorAll('.tl-card, .tl-dot').forEach(el=>{
    const obs = new IntersectionObserver(entries=>{
      entries.forEach(e=>{
        if(!e.isIntersecting) return;
        const i = parseInt(el.dataset.i||0);
        setTimeout(()=>{
          el.classList.add(el.classList.contains('tl-dot') ? 'pop' : 'revealed');
        }, i*80);
        obs.unobserve(e.target);
      });
    },{threshold:0.2});
    obs.observe(el);
  });
}

/* ════════════════════════════════════════════════════
   TAB CONTROLLER
════════════════════════════════════════════════════ */
let currentTab = 'all';
function setTab(t){
  currentTab = t;
  // Update tab UI
  document.querySelectorAll('.tab').forEach(tab=>{
    const active = tab.dataset.t === t;
    tab.classList.toggle('active', active);
  });
  // Render view
  const view = document.getElementById('view');
  view.innerHTML = (t==='all') ? renderAll() : renderTradition(TRADITIONS[t]);
  view.classList.remove('view-enter');
  void view.offsetWidth; // force reflow
  view.classList.add('view-enter');
  // Init animations after a short delay (allow DOM paint)
  setTimeout(()=>{
    initRevealObs();
    initBars();
    if(t==='all') initAllGauges(); else initGauge();
    initTimeline();
  }, 60);
  // Scroll to top of content
  window.scrollTo({top:0, behavior:'smooth'});
}

// Initial render
setTab('all');
</script>
